<head>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --sidebar: #0f1115;
      --sidebar-text: #c9ced6;
      --bg: #f4f6fa;
      --card: #ffffff;
      --border: #e9edf3;
      --muted: #7a828e;
      --text: #1f2430;

      --new-bg: #fff1f2;   --new-bd: #f43f5e;   --new-tx: #be123c;
      --today-bg:#eff6ff;  --today-bd:#3b82f6;  --today-tx:#1d4ed8;
      --all-bg: #f0fdf4;   --all-bd: #22c55e;   --all-tx: #15803d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ---------- LAYOUT ---------- */
    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 230px;
      flex-shrink: 0;
      background: var(--sidebar);
      color: var(--sidebar-text);
      padding: 26px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .sidebar .brand {
      color: #fff;
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: .5px;
      margin-bottom: 36px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar .nav-link {
      color: var(--sidebar-text);
      border-radius: 10px;
      padding: 11px 14px;
      margin-bottom: 6px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: .15s;
    }
    .sidebar .nav-link:hover { background: rgba(255,255,255,.06); color: #fff; }
    .sidebar .nav-link.active { background: #2563eb; color: #fff; }

    .main { flex: 1; padding: 26px 30px; min-width: 0; }

    .page-title { font-weight: 700; font-size: 1.5rem; margin-bottom: 22px; }

    /* ---------- STAT BLOCKS ---------- */
    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat {
      border: 2px solid;
      border-radius: 16px;
      padding: 18px 20px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .stat .label { font-weight: 600; font-size: .95rem; }
    .stat .value { font-size: 1.9rem; font-weight: 700; line-height: 1.1; }
    .stat .unit  { font-size: .8rem; color: var(--muted); font-weight: 500; }

    .stat.new   { background: var(--new-bg);   border-color: var(--new-bd);   }
    .stat.new .label, .stat.new .value     { color: var(--new-tx); }
    .stat.today { background: var(--today-bg); border-color: var(--today-bd); }
    .stat.today .label, .stat.today .value { color: var(--today-tx); }
    .stat.all   { background: var(--all-bg);   border-color: var(--all-bd);   }
    .stat.all .label, .stat.all .value     { color: var(--all-tx); }

    /* ---------- TABLE ---------- */
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .search-box {
      flex: 1;
      max-width: 320px;
      min-width: 180px;
      position: relative;
    }
    .search-box i {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted);
    }
    .search-box input {
      width: 100%;
      padding: 9px 14px 9px 38px;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
    }
    .search-box input:focus { border-color: #2563eb; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #f8fafc;
      color: var(--muted);
      font-weight: 600;
      font-size: .86rem;
      text-align: left;
      padding: 14px 16px;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable .arrow { opacity: .5; font-size: .75rem; }

    tbody td {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      font-size: .92rem;
    }
    tbody tr { transition: background .12s; }
    tbody tr.clickable { cursor: pointer; }
    tbody tr.clickable:hover { background: #f8fbff; }
    tbody tr:last-child td { border-bottom: none; }

    .order-no { font-weight: 600; color: #2563eb; }
    .amount   { font-weight: 600; }

    .badge-status {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: .8rem;
      font-weight: 600;
    }
    .badge-new  { background: var(--new-bg);  color: var(--new-tx);  }
    .badge-done { background: var(--all-bg);  color: var(--all-tx);  }

    .items-btn {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 9px;
      padding: 5px 12px;
      color: #2563eb;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .items-btn:hover { background: #f1f5ff; }

    .empty-row td { text-align: center; color: var(--muted); padding: 40px; }

    /* ---------- MODAL ---------- */
    .modal-detail .modal-content { border: none; border-radius: 18px; overflow: hidden; }
    .modal-detail .modal-header {
      background: #0f1115; color: #fff; border: none; padding: 18px 22px;
    }
    .modal-detail .modal-title { font-weight: 700; }
    .detail-grid { display: grid; grid-template-columns: 130px 1fr; row-gap: 10px; column-gap: 12px; }
    .detail-grid .k { color: var(--muted); font-weight: 500; }
    .detail-grid .v { font-weight: 600; }
    .items-table { width: 100%; margin-top: 6px; }
    .items-table th { background: #f8fafc; padding: 10px 12px; font-size: .85rem; }
    .items-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .modal-product-raw { font-size: .95rem; line-height: 1.7; white-space: pre-wrap; }

    /* ---------- LOADING ---------- */
    .loading {
      position: fixed; inset: 0; background: rgba(255,255,255,.65);
      display: none; align-items: center; justify-content: center; z-index: 2000;
    }
    .loading.show { display: flex; }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 1100px) {
      .stats { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 820px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: static; display: flex; align-items: center; gap: 18px; padding: 14px 18px; }
      .sidebar .brand { margin-bottom: 0; }
      .sidebar .nav-link { margin-bottom: 0; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .table-scroll { overflow-x: auto; }
      table { min-width: 720px; }
    }
    @media (max-width: 480px) {
      .stats { grid-template-columns: 1fr; }
      .main { padding: 18px; }
    }

   /* ===== ตารางที่อยู่ — โมเดิร์น + แถวสีสลับ ===== */
.fl-table {
    border-collapse: separate;
    border-spacing: 0;
    width: 100%;
    min-width: 700px;
    max-width: 900px;
    border-radius: 8px;          /* โค้งนิดหน่อย */
    overflow: hidden;
    box-shadow: 0 8px 28px rgba(0,0,0,.10);
    font-family: 'Sarabun', sans-serif;
    background: #fff;
    min-height: 100%;
}


.fl-table thead th {
    position: sticky;
    top: 0;
    z-index: 2;
    background: #607d8b;          /* เทาอมฟ้า */
    color: #fff;
    font-weight: 600;
    font-size: .92rem;
    letter-spacing: .3px;
    text-align: center;
    padding: 15px 14px;
    border: none;
}

.fl-table th,
.fl-table td {
    border: none;
    border-bottom: 1px solid #eef1f5;
    padding: 13px 16px;
    font-weight: 500;            /* เลิกใช้ตัวหนาทั้งตาราง */
    color: #2a2f3a;
    vertical-align: middle;
}

.fl-table tbody {
    display: block;
    min-height: 700px;
 max-height: 700px;

    overflow-y: auto;
}

.fl-table thead,
.fl-table tbody tr {
    display: table;
    width: 100%;
    table-layout: fixed;
}

/* แถวสีสลับ (zebra) */
.fl-table tbody tr:nth-child(odd)  { background: #ffffff; }
.fl-table tbody tr:nth-child(even) { background: #f5f8fc; }

/* ไฮไลต์เมื่อชี้เมาส์ */
.fl-table tbody tr {
    cursor: pointer;
    transition: background .12s;
}
.fl-table tbody tr:hover { background: #e8f0fe; }

/* แถวสุดท้ายไม่ต้องมีเส้นใต้ */
.fl-table tbody tr:last-child td { border-bottom: none; }

      <script>

 function loadFormSheet() {
            const scriptUrl = "https://script.google.com/macros/s/AKfycbwxfBjGLgCiW_VsJZ7GhFIw3bO9NQegXRZLM3IPT3vahnRLsqmRhRoWZiY305EKBreS0Q/exec";

            fetch(scriptUrl)
                .then(function (response) {
                    if (!response.ok) {
                        throw new Error("การเชื่อมต่อผิดพลาด");
                    }
                    return response.json();
                })
                .then(function (data) {
                    // เก็บข้อมูลลงตัวแปร
                    orderData = data;

                    // เรียงลำดับ orderDate จากใหม่สุด -> เก่าสุด
                    orderData.sort(function (a, b) {
                        return new Date(b.orderDate) - new Date(a.orderDate);
                    });

                    let html = "";
                    for (let i = 0; i < orderData.length; i++) {
                        if (orderData[i].status === "ออเดอร์ใหม่") {
                            html += `
    <tr style="cursor: pointer;" onclick="openProductDetail(${i})" class="trnew">
        <td style="width: 150px">${formatDate(orderData[i].orderDate)}</td>
        <td style="width: 100px">${orderData[i].orderNumber}</td>
        <td style="width: 180px">${orderData[i].customer}</td>
        <td style="width: 100px">${numberWithCommas(orderData[i].amount)}</td>
        <td style="width: 100px" >${orderData[i].callBack}</td>
        <td style="width: 100px">${orderData[i].callBackValue}</td>
        <td class="neworder fw-bold">New Order</td>
    </tr>`;
                        } else {
                            html += `
    <tr style="background-color: lightgray;">
        <td style="width: 150px">${formatDate(orderData[i].orderDate)}</td>
        <td style="width: 100px">${orderData[i].orderNumber}</td>
        <td style="width: 180px">${orderData[i].customer}</td>
        <td style="width: 100px">${numberWithCommas(orderData[i].amount)}</td>
        <td style="width: 100px">${orderData[i].callBack}</td>
        <td style="width: 100px">${orderData[i].callBackValue}</td>
        <td style="color: white;">Complete</td>
    </tr>`;
                        }
                    }

                    // แสดงผลในตาราง
                    $("#results").html(html);
                })
        }


        function loadFormAddressSheet() {
            const scriptUrl = "https://script.google.com/macros/s/AKfycbytA_cS0J5jFWuVJ2BNHWPDcOmRtw_Rj-9merdreY175SnjSwdkQpxRLFc68s3chCb2Qg/exec";

            fetch(scriptUrl)
                .then(function (response) {
                    if (!response.ok) {
                        throw new Error("การเชื่อมต่อผิดพลาด");
                    }
                    return response.json();
                })
                .then(function (data) {
                    // เก็บข้อมูลลงตัวแปร
                    orderData = data;



                    let html = "";
                    for (let i = 0; i < orderData.length; i++) {
                        html += `
    <tr style="cursor: pointer;" onclick="openAddressDetail(${i})" class="trnew">
        <td style="width: 25%;">${orderData[i].addressName}</td>
        <td class="text-start" style="width: 50%;">${orderData[i].address}</td>
        <td style="width: 25%;">${orderData[i].addressTel}</td>
                     </tr>`;

                    }


                    $("#resultsaddress").html(html);
                })
        }





        var orderindex = 0;
        function openProductDetail(index) {
            orderindex = index;
            console.log(orderindex)
            $("#detail_orderDate").text(formatDate(orderData[index].orderDate));
            $("#detail_orderNumber").text(orderData[index].orderNumber);
            $("#detail_customer").text(orderData[index].customer);
            $("#detail_amount").text(numberWithCommas(orderData[index].amount) + ' THB');
            $("#detail_callback").text(orderData[index].callback);
            $("#detail_callbackValue").text(orderData[index].callbackValue);
            $("#detail_address").text(orderData[index].address);
            $("#detail_tel").text('0' + (orderData[index].tel));
            $("#detail_status").text("รอตรวจสอบ");


        }


        var orderindex = 0;
        function openAddressDetail(index) {
            orderindex = index;
            console.log(orderindex)
            $("#namesticker").text(orderData[index].addressName);
            $("#addresssticker").text(orderData[index].address);
            $("#telsticker").text(orderData[index].addressTel);
           $("#labelsticker").css('display', 'block');
            $("#addresspan").css('display', 'block');
            $("#addressinput").css('display', 'none');
           
        }



        function loaddetail() {
            const scriptUrl = "https://script.google.com/macros/s/AKfycbxkJF-_Swlz8QD3Sb8npLEvckz0MkqlkECXzeEENqsdwMi6Ij6qej86Uqji-1Rc8pfx/exec";

            fetch(scriptUrl)
                .then(function (response) {
                    if (!response.ok) {
                        throw new Error("การเชื่อมต่อผิดพลาด");
                    }
                    return response.json();
                })
                .then(function (data) {
                    const numberdetail = document.getElementById('detail_orderNumber').textContent.trim();
                    let html = "";

                    for (let i = 0; i < data.length; i++) {
                        if (data[i].orderId == numberdetail) {
                            html += `<p class="fs-6" style="font-family: sarabun;">${data[i].orderDetail}</p>`;
                            break; // ถ้าพบแล้วหยุดเลย ไม่ต้องวนต่อ
                        }
                    }

                    // แสดงผลลัพธ์
                    document.getElementById("mycart").innerHTML = html;

                    // แสดง modal
                    document.getElementById("modalCart").style.display = "flex";
                })
                .catch(function (error) {
                    console.error("เกิดข้อผิดพลาด:", error);
                    document.getElementById("mycart").innerHTML = "ไม่สามารถโหลดข้อมูลได้";
                });

        }


        function updateOrderState() {
            document.getElementById("waiting").style.display = "flex";
            setTimeout(() => {
                updateOrderStatus();
            }, 3000);
            document.getElementById("modalCart").style.display = "none";
        }

        function updateOrderStatus() {

            const orderNumber = document.getElementById('detail_orderNumber').textContent;
            fetch("https://update-sheet.onrender.com/update-order", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const day = String(date.getDate()).padStart(2, "0");
            const month = String(date.getMonth() + 1).padStart(2, "0"); // เดือนเริ่มจาก 0
            const year = date.getFullYear();
            const hours = String(date.getHours()).padStart(2, "0");
            const minutes = String(date.getMinutes()).padStart(2, "0");

            return `${day}/${month}/${year} ${hours}:${minutes}`;
        }

        function numberWithCommas(amount) {
            return Number(amount).toLocaleString("en-US", {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

            fetch(scriptUrl)
                .then(function (response) {

function downloadPDF() {
    const element = document.getElementById('capture-area');

    html2canvas(element, {
      scale: 2,
      useCORS: true
    }).then(canvas => {
      const imgData = canvas.toDataURL('image/png');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');

      const pdfWidth = pdf.internal.pageSize.getWidth();
      const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

      pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);

      // เปิดไฟล์ในแท็บใหม่
      const pdfBlobUrl = pdf.output('bloburl');
      window.open(pdfBlobUrl, '_blank');
    });
}
